 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANNA GRAB & GO — Fresh. Fast. Nourishing.</title>
    <style>
        body { font-family: 'Segoe UI', 'Helvetica Neue', Arial, 'Liberation Sans', sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 500px; margin: 40px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #ccc; padding: 24px; }
        h1 { text-align: center; }
        #chat { height: 300px; overflow-y: auto; border: 1px solid #ddd; padding: 12px; margin-bottom: 16px; background: #fafafa; border-radius: 4px; }
        .user { color: #0078d7; }
        .ai { color: #333; }
        #orderForm { display: flex; }
        #orderInput { flex: 1; padding: 8px; border-radius: 4px 0 0 4px; border: 1px solid #ccc; }
        #sendBtn, #voiceBtn, #orderBtn, #preOrderBtn, #reserveBtn, #menuBtn, #makePaymentBtn, #drinksBtn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s, color 0.2s, box-shadow 0.2s;
            min-width: 100px;
            margin-bottom: 6px;
            background: #2e7d32;
            color: #fff;
        }
        #sendBtn:hover, #voiceBtn:hover, #orderBtn:hover, #preOrderBtn:hover, #reserveBtn:hover, #menuBtn:hover, #makePaymentBtn:hover, #drinksBtn:hover {
            background: #1b5e20;
            color: #fff;
            box-shadow: 0 2px 8px #bbb;
        }
        /* Audio enable banner */
        #audioBanner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #2e7d32;
            color: #fff;
            text-align: center;
            padding: 12px;
            z-index: 10000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            display: none; /* Hidden by default, shown via JS */
        }
        #audioBanner button {
            margin-left: 12px;
            padding: 6px 12px;
            background: #fff;
            color: #2e7d32;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        #audioBanner button:hover {
            background: #f0f0f0;
        }
        @media (max-width: 600px) {
            .container { max-width: 98vw; padding: 8px; }
            #orderForm { flex-direction: column; }
            #orderInput, #sendBtn, #voiceBtn {
                width: 100%;
                border-radius: 4px;
                margin-bottom: 6px;
            }
            #preOrderBtn, #reserveBtn, #menuBtn, #makePaymentBtn {
                min-width: 80px;
                font-size: 0.95rem;
                padding: 8px 0;
            }
            #audioBanner {
                padding: 8px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <!-- Audio enable banner -->
    <div id="audioBanner">
        <span>Enable audio to hear voice prompts and responses</span>
        <button id="enableAudioBannerBtn">Enable Audio</button>
    </div>
    <div class="container">
    <img id="randomImage" src="" alt="Header Image" style="width:100%;max-height:200px;object-fit:cover;border-radius:8px;margin-bottom:16px; margin-top:0; display:block;" />
    <h1 style="font-size:2.5em;">MANNA GRAB & GO</h1>
    <div style="text-align:center;font-size:1.1em;color:#888;margin-bottom:12px;">Fresh. Fast. Nourishing.</div>
        
        <!-- Add action buttons here -->
        <div id="actionBar" style="display:flex;justify-content:space-between;margin-bottom:12px;gap:6px;">
            <button id="preOrderBtn" class="action-button">Pre Order</button>
            <button id="menuBtn" class="action-button">Menu</button>
            <button id="drinksBtn" class="action-button">Drinks</button>
            <button id="makePaymentBtn" class="action-button" style="background:#ff9800;">Make Payment</button>
        </div>
        
        <div id="chat"></div>
        <form id="orderForm">
            <input type="text" id="orderInput" placeholder="Type your order or question..." autocomplete="off" required />
            <button type="submit" id="sendBtn">Send</button>
            <button type="button" id="voiceBtn" style="margin-left:8px;">🎤</button>
        </form>
    </div>
    <footer style="text-align:center; margin-top:24px; color:#888; font-size:14px;">
        Powered by I.TEE CONCEPT GLOBAL(I.TEC)
    </footer>
    <!-- Blockchain support removed: ethers.js CDN removed -->
    <script>
        const chat = document.getElementById('chat');
        const orderForm = document.getElementById('orderForm');
        const orderInput = document.getElementById('orderInput');
        const randomImage = document.getElementById('randomImage');
        const voiceBtn = document.getElementById('voiceBtn');
        const preOrderBtn = document.getElementById('preOrderBtn');
        const menuBtn = document.getElementById('menuBtn');
        const makePaymentBtn = document.getElementById('makePaymentBtn');

        // Session state for tracking urgent events and other session-level flags
        const sessionState = { lastUrgent: null };

        // Random image logic
        const images = [
            'https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=800&q=80',
            'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?auto=format&fit=crop&w=800&q=80',
            'https://images.unsplash.com/photo-1467003909585-2f8a72700288?auto=format&fit=crop&w=800&q=80',
            'https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?auto=format&fit=crop&w=800&q=80',
            'https://i.ibb.co/chQV4r6K/file-00000000ad0071fb9bd214f95362865c.png',
            'https://i.ibb.co/YBVdn7j4/file-00000000128c71f49463babbc83cc5e4.png',
            'https://i.ibb.co/S4pNHcCH/file-00000000982c7243b465271f570c8133.png',
            'https://i.ibb.co/TBs5syMf/file-000000003f187246a8481a40b4aa6d99.png',
            'https://i.ibb.co/S7GtNMJs/file-00000000f3d872439928fd96d2dc16c6.png',
            'https://i.ibb.co/S7yC8RRh/file-00000000279471f481846613e3f667ea.png',
            'https://i.ibb.co/4nbrZTSz/file-000000004a087246a8a9e82b2c025e7a.png',
            'https://i.ibb.co/bj0SN4DY/file-00000000ea6471f49e9d85936dceaa20.png'
        ];
        function setRandomImage() {
            const idx = Math.floor(Math.random() * images.length);
            randomImage.src = images[idx];
        }
        setRandomImage();
        setInterval(setRandomImage, 4000); // Change image every 4 seconds
        randomImage.onerror = setRandomImage;

        // Robust voice synthesis helper with enable-audio fallback
        let audioEnabled = false; // set true after a user gesture
        let pendingUtteranceText = null;
        function speak(text, opts = {}) {
            if (!('speechSynthesis' in window)) return false;
            // If audio hasn't been enabled by a user gesture yet, store the utterance
            // and show the enable overlay instead of attempting to speak (many
            // browsers silently block speak() calls without throwing).
            if (!audioEnabled) {
                pendingUtteranceText = text;
                showEnableAudioOverlay();
                return false;
            }

            try {
                if (opts.cancel !== false) window.speechSynthesis.cancel();
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = opts.lang || 'en-US';
                utter.rate = typeof opts.rate === 'number' ? opts.rate : 1.0;
                utter.pitch = typeof opts.pitch === 'number' ? opts.pitch : 1.0;
                utter.volume = typeof opts.volume === 'number' ? opts.volume : 1.0;
                utter.onstart = () => {};
                utter.onend = () => { pendingUtteranceText = null; };
                utter.onerror = () => { pendingUtteranceText = null; };
                window.speechSynthesis.speak(utter);
                return true;
            } catch (err) {
                console.warn('speak error', err);
                return false;
            }
        }

        function showEnableAudioOverlay() {
            if (document.getElementById('enableAudioBtn')) return;
            const btn = document.createElement('button');
            btn.id = 'enableAudioBtn';
            btn.textContent = 'Enable audio — Tap to hear prompts';
            Object.assign(btn.style, {
                position: 'fixed', right: '12px', bottom: '12px', zIndex: 9999,
                padding: '10px 14px', background: '#0078d7', color: '#fff', border: 'none', borderRadius: '8px', boxShadow: '0 2px 8px rgba(0,0,0,0.2)'
            });
            btn.onclick = function() {
                audioEnabled = true;
                const el = document.getElementById('enableAudioBtn');
                if (el) el.remove();
                if (pendingUtteranceText) {
                    try { speak(pendingUtteranceText, { cancel: false }); pendingUtteranceText = null; } catch(e){}
                }
            };
            document.body.appendChild(btn);
        }

        // Voice recognition
        let recognizing = false;
        let recognition;
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                orderInput.value = transcript;
                orderForm.dispatchEvent(new Event('submit'));
            };
            recognition.onend = function() { recognizing = false; voiceBtn.textContent = '🎤'; };
        }

        voiceBtn.addEventListener('click', function() {
            if (recognition && !recognizing) {
                recognition.start();
                recognizing = true;
                voiceBtn.textContent = '🛑';
            } else if (recognition && recognizing) {
                recognition.stop();
                recognizing = false;
                voiceBtn.textContent = '🎤';
            }
        });

        // Only show the order button once per session
        let orderButtonShown = false;

        // ===== TONE & SENSITIVITY =====
        function analyzeTone(text){
            const t = String(text || '').toLowerCase();
            return {
                urgent: /\b(urgent|emergency|now|immediately|asap|help me)\b/.test(t),
                distress: /\b(allerg|allergic|choke|breath|pain|injur|collapsed|collapse)\b/.test(t),
                anger: /\b(angry|annoyed|mad|frustrat|what the|this is bad)\b/.test(t),
                polite: /\b(please|thank you|thanks|kindly)\b/.test(t),
                profanity: /\b(fuck|shit|damn|bastard|idiot)\b/.test(t)
            };
        }

        function handleUrgentMessage(userMessage, tone){
            // Food-service specific urgent flow
            const notice = (tone.distress || tone.urgent) ?
                '<div style="background:#fff3cd;padding:10px;border-left:4px solid #ffc107;border-radius:6px;margin:8px 0;"><strong>Immediate assistance:</strong> If this is a medical emergency (allergic reaction), please let us know. Would you like me to notify support or prepare an urgent note for the kitchen?<div style="margin-top:8px;"><button onclick="notifySupport()" style="margin-right:8px;padding:8px 10px;border-radius:6px;background:#dc3545;color:#fff;border:none;">Notify support</button><button onclick="callEmergency()" style="padding:8px 10px;border-radius:6px;background:#ffc107;color:#000;border:none;">Call emergency</button></div></div>' : '';
            appendMessage('ai', notice + "I'm here to help — please tell me briefly what happened so I can assist.");
            // record for session (could be extended to alert staff)
            sessionState.lastUrgent = { message: userMessage, detected: tone };
        }

        function notifySupport(){
            appendMessage('ai', 'Okay — support has been notified and a priority note has been prepared. If you want follow-up, please call this phone number 08132115139 or email mannagrabngo@gmail.com and we will confirm.');
            if (!sessionState.lastUrgent) sessionState.lastUrgent = {};
            sessionState.lastUrgent.notified = true;
        }

        function callEmergency(){
            appendMessage('ai', 'If this is an immediate emergency, please call your local emergency services now (e.g., 911 or 112) and get to a safe place.');
        }

        // Helper to append account/payment details and attach a Pay Now button
        function showAccountDetails(prefix = ''){
            const accountDetails = 'BANK NAME: OPAY, ACCOUNT NUMBER: 08132115139, ACCOUNT NAME: Taiwo iwaloga.';
            appendMessage('ai', (prefix ? prefix + '<br>' : '') + 'Here are the account details for payment: <strong>' + accountDetails + '</strong><br><button id="payNowBtn" style="margin-top:10px;padding:8px 12px;background:#ff9800;color:#fff;border:none;border-radius:6px;">Pay Now</button>');
            // Attach handler shortly after DOM insertion
            setTimeout(()=>{
                const p = document.getElementById('payNowBtn');
                if(!p) return;
                p.onclick = async function(){
                    try{
                        await processPaymentOnBlockchain();
                        appendMessage('ai', 'Payment intent recorded. If you completed the payment via your bank transfer or gateway, please save the receipt for confirmation.');
                    }catch(err){
                        console.error('Payment initiation failed:', err);
                        appendMessage('ai', 'There was an issue initiating the payment. Please try again or use the account details provided.');
                    }
                };
            }, 120);
        }

        function paymentReminderText(){
            return ' Please remember to come back here to make payment so we can serve you faster.';
        }

        function aiResponse(message) {
            const lowerMsg = message.toLowerCase();
            const tone = analyzeTone(message);

            // If urgent or distress detected, use immediate path
            if (tone.urgent || tone.distress) {
                handleUrgentMessage(message, tone);
                // ai response already appended by handler; return empty so we don't duplicate
                return '';
            }

            let response = "";
            // reuse helper reminder text for consistency
            const paymentReminder = paymentReminderText();

            if (lowerMsg.includes('menu')) {
                // Build the menu from the canonical foodTypes list (fallback to a short message)
                let menuHtml = "Absolutely! Here's our menu:<br><ul>";
                try {
                    if (typeof foodTypes !== 'undefined' && Array.isArray(foodTypes)) {
                        menuHtml += foodTypes.map(f => `<li>${f}</li>`).join('');
                    } else {
                        menuHtml += '<li>Manna Chicken Supreme</li><li>Garden Vitality Sandwich</li><li>Sunrise Egg Delight</li>';
                    }
                } catch (e) {
                    menuHtml += '<li>Manna Chicken Supreme</li><li>Garden Vitality Sandwich</li><li>Sunrise Egg Delight</li>';
                }
                menuHtml += "</ul>May I recommend you check the specials first? If you have any preferences or dietary needs, just let me know—I'm here to make your dining experience wonderful.";
                response = menuHtml;
                response += "<br><br><strong>Our wholesome ingredients & benefits:</strong> We use cucumber, lemon, lettuce, fennel, mint, rosemary, moringa, cabbage, and carrot in sandwiches, drinks, and salads. These ingredients help support hydration, digestion, immune health, heart health, weight management, energy and overall wellness.";

            } else if (lowerMsg.includes('pasta')) {
                response = "Our pasta is cooked to perfection and served with a variety of delicious sauces. The pasta is a creamy Alfredo—would you like to give it a try?";
            } else if (lowerMsg.includes('salad')) {
                response = "Our salads are crisp, fresh, and full of flavor. The delightful mix of greens, nuts, and a house-made dressing. Would you like to try it?";
            } else if (lowerMsg.includes('order') || lowerMsg.includes('pre order')) {
                logOrderToBlockchain(message);
                response = "Please place your order first using the 'Place Order' button below. Once your order is placed, you can make payment using the account details provided. If you need any assistance, I'm here to help!";
            } else if (lowerMsg.includes('thank')) {
                response = "You're most welcome! It's my pleasure to assist you. If you need anything else, just let me know. Enjoy your dining experience!";
            } else {
                response = "Welcome! I'm your friendly AI, here to make your dining experience delightful. If you have any questions about the menu or need recommendations, just ask.<br>All restaurant you prefer in one place. Thank you for doing business with us today.";
            }

            // Adjust tone based replies
            if (tone.anger || tone.profanity) {
                response = "I'm sorry you're feeling that way. " + response;
            } else if (tone.polite) {
                response = "Thanks for being polite! " + response;
            }

            response += paymentReminder;
            response += '<br><button id="orderBtn" style="margin-top:10px;padding:8px 16px;background:#0078d7;color:#fff;border:none;border-radius:4px;cursor:pointer;">Place Order</button>';
            return response;
        }

        // Intercept chat to handle order button click
        function appendMessage(sender, text) {
            // Guard against undefined/null text to avoid 'undefined' appearing
            if (typeof text === 'undefined' || text === null) text = '';
            const div = document.createElement('div');
            div.className = sender;
            if (sender === 'ai') {
                div.innerHTML = text;
            } else {
                div.textContent = (sender === 'user' ? 'You: ' : '') + text;
            }
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            if (sender === 'ai') {
                try{
                    const spoken = (div.innerText || div.textContent || '').toString();
                    speak(spoken.replace(/<[^>]+>/g, ''));
                }catch(e){}
                // Add event listener for order button
                setTimeout(() => {
                            const btn = div.querySelector('#orderBtn');
                            if (btn) {
                                btn.onclick = function() {
                                    window.open('https://www.restaurantlogin.com/api/fb/z5q_rm', '_blank');
                                };
                            }
                }, 100);
            }
        }

        async function logOrderToBlockchain(order) {
            // Blockchain integration removed — record order locally (demo)
            try {
                console.log('Order recorded (local demo):', order);
                appendMessage('ai', 'Order recorded (demo). Please use the payment details or the Pay Now button to complete your payment.');
                return Promise.resolve({ status: 'recorded', order: order });
            } catch (err) {
                console.error('Order logging error (local):', err);
                return Promise.reject(err);
            }
        }

        async function processPaymentOnBlockchain() {
            // Blockchain payment removed. Use account details or Pay Now flow that does not depend on blockchain wallets.
            appendMessage('ai', 'If you completed the payment via your bank transfer or payment gateway, please save the receipt for confirmation.');
            return Promise.resolve({ status: 'no-op' });
        }

        orderForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const userMsg = (orderInput.value || '').trim();
            if(!userMsg) return;
            appendMessage('user', userMsg);

            // If user typed a known food category, emulate the button click flow
            const matchedFood = matchFoodType(userMsg);
            if(matchedFood){
                selectedFoodType = matchedFood;
                const aiText = `Great choice! You selected <strong>${selectedFoodType}</strong>.<br>Before I recommend the best meals, do you have any health condition I should consider?`;
                appendMessage('ai', aiText + '<div style="margin-top:10px;">' + renderButtons(healthOptions, 'health') + '</div>');
                speak(`Great choice! ${selectedFoodType}. Before I recommend the best meals, do you have any health condition I should consider?`);
                orderInput.value = '';
                return;
            }

            const aiMsg = aiResponse(userMsg);
            if (aiMsg) setTimeout(() => appendMessage('ai', aiMsg), 500);
            orderInput.value = '';
        });

        // Polite, interesting, and food-craving welcome greetings
        const welcomeGreetings = [
            `Welcome to Manna Grab & Go! 🌿<br>Hello and thank you for choosing Manna Grab & Go — where healthy meets convenient!<br>We're delighted to serve you fresh sandwiches, nourishing drinks, and wholesome snacks made with carefully selected vegetables, herbs, and natural spices. Every item is prepared to help you enjoy great taste while supporting your wellness goals.<br><strong>Why customers keep coming back:</strong><br>🥪 Freshly made and ready to grab<br>⚡ Fast service for busy lifestyles<br>🌿 Packed with natural ingredients<br>💚 Supports healthy living and daily wellness<br>💰 Affordable goodness you can enjoy every day<br>Whether you're heading to work, school, a meeting, or simply need a quick healthy meal, we've got something delicious waiting for you.<br><em>Remember: Healthy eating doesn't have to be difficult. Just grab, go, and enjoy!</em><br>Thank you for being part of the Manna Grab & Go family. We look forward to serving you again soon.<br>🌟 Manna Grab & Go "Grab Goodness. Go Further."`,
            `Welcome to Manna Grab & Go!<br>I'm your wellness assistant, here to help you discover fresh sandwiches, healthy drinks, and nourishing snacks that fit your lifestyle.<br>Looking for more energy? Better digestion? A quick healthy meal? We've got you covered.<br>Fresh, Nutritious, Convenient, Made for your well-being<br>What would you like to enjoy today?`,
            `Welcome to Manna Grab & Go!<br>Fresh, nutritious, convenient, and made for your well-being.<br>What would you like to enjoy today?`
        ];
        // --- Interactive Food + Health flow ---
        const foodTypes = [
            'Manna Chicken Supreme',
            'Garden Vitality Sandwich',
            'Sunrise Egg Delight',
            'Golden Crunch french fries',
            'Manna Power Pocket (Bread + Akara)',
            'Heritage Breakfast Combo (Akara + Pap)',
            'Champion\'s Breakfast pack (Akara + Oatmeal)',
            'MANAZO Vitality Drinks'
        ];
        // Removed 'Food allergies' option per request
        const healthOptions = ['Ulcer', 'High blood pressure', 'Diabetes', 'Weight loss goals', 'None'];

        const recommendations = {
            'Ulcer': `At <strong>Manna Grab & Go</strong>, we believe good food should not only taste great, but also support your wellness and fit your lifestyle. Whether you are managing a health condition or simply looking for a lighter, more balanced meal, we have thoughtfully prepared options that can help you eat well and feel good.<br><br><strong>🌿 For Ulcer</strong><br>If you have an ulcer, it is usually best to choose meals that are soft, gentle on the stomach, and not too spicy, oily, or acidic. The good news is that we have comforting options that can still be satisfying and delicious.<br><br><strong>Recommended Meals</strong><ol><li><strong>Champion’s Breakfast Pack (Akara + Oatmeal)</strong><br>This is a warm, filling, and stomach-friendly choice. Oatmeal is known for being gentle and soothing, while akara gives you a good protein boost to keep you energized. Pair it with <strong>MANAZO Drink</strong> for a refreshing wellness beverage that completes your meal beautifully.</li><li><strong>Heritage Breakfast Combo (Akara + Pap)</strong><br>A classic, comforting meal that feels light yet nourishing. Pap is easy to digest and makes this combo a great option when you want something simple, satisfying, and kind to your stomach. Add <strong>MANAZO Drink</strong> for a naturally refreshing finish.</li><li><strong>Garden Vitality Sandwich</strong><br>Fresh vegetables make this a wholesome and nourishing choice. If your ulcer is active, you may prefer it with lighter mayonnaise or reduced spices. It is a great option when you want something fresh, balanced, and easy to enjoy. Pair it with <strong>MANAZO Drink</strong> for a pleasant and refreshing meal experience.</li></ol><strong>Helpful Advice:</strong><ul><li>Eat smaller meals more often instead of waiting too long between meals.</li><li>Try to avoid too much pepper, caffeine, and very oily foods.</li><li>Drink enough water throughout the day.</li><li>Choose meals that feel gentle and comfortable for your body.</li></ul>`,
            'High blood pressure': `If you are managing high blood pressure, choosing meals with more vegetables, balanced protein, and less excess salt can be a smart and healthy step. Our menu includes tasty options that can help you enjoy your food while still making mindful choices.<br><br><strong>Recommended Meals</strong><ol><li><strong>Garden Vitality Sandwich</strong><br>Packed with fresh vegetables and plant-based goodness, this is one of the lightest and most refreshing choices on the menu. It is a great everyday option for anyone looking to eat well and stay balanced. Pair it with <strong>MANAZO Drink</strong> for a refreshing wellness boost.</li><li><strong>Champion’s Breakfast Pack (Akara + Oatmeal)</strong><br>This combo offers a satisfying mix of protein and fiber. Oatmeal is a heart-friendly choice, and akara adds energy to help you stay active and focused throughout the day. Enjoy it with <strong>MANAZO Drink</strong> for a nourishing and refreshing meal.</li><li><strong>Manna Chicken Supreme</strong><br>A delicious combination of chicken and vegetables that gives you a more balanced meal option. It is filling, flavorful, and a great choice when you want something wholesome and satisfying. Pair it with <strong>MANAZO Drink</strong> for added refreshment.</li></ol><strong>Helpful Advice:</strong><ul><li>Reduce extra salt, ketchup, and heavy sauces where possible.</li><li>Stay hydrated and keep active when you can.</li><li>Limit frequent intake of fries and heavily fried foods.</li><li>Choose meals that support your health without sacrificing taste.</li></ul>`,
            'Diabetes': `If you are living with diabetes, balanced meals with fiber, protein, and moderate carbohydrates can help support better blood sugar control. The right meal choices can still be tasty, filling, and enjoyable.<br><br><strong>Recommended Meals</strong><ol><li><strong>Garden Vitality Sandwich</strong><br>This is a lighter option with plenty of vegetables and less heavy carbohydrate content than fries-based meals. It is a smart and refreshing choice for anyone looking for a more balanced meal. Pair it with <strong>MANAZO Drink</strong> as a refreshing beverage option.</li><li><strong>Manna Chicken Supreme</strong><br>Chicken provides protein, while the vegetables add fiber and freshness. This combination can help make your meal more balanced and satisfying. Pair it with <strong>MANAZO Drink</strong> for a wholesome and enjoyable meal experience.</li><li><strong>Champion’s Breakfast Pack (Akara + Oatmeal)</strong><br>Oatmeal is a great source of fiber and may help support slower sugar absorption when eaten in moderation. Combined with akara, it becomes a filling and nourishing breakfast choice. Enjoy it with <strong>MANAZO Drink</strong> for a naturally inspired drink.</li></ol><strong>Helpful Advice:</strong><ul><li>Avoid sugary drinks and very large portions.</li><li>Combine carbohydrates with protein and fiber for better balance.</li><li>Try to eat at regular times each day.</li><li>Choose meals that help you feel full, energized, and in control.</li></ul>`,
            'Weight loss goals': `If your goal is healthy weight management, meals that are rich in vegetables, protein, and fiber can help you feel satisfied for longer and reduce unnecessary snacking. At Manna Grab & Go, we have options that are both enjoyable and mindful.<br><br><strong>Recommended Meals</strong><ol><li><strong>Garden Vitality Sandwich</strong><br>A light, fresh, and vegetable-rich option that is perfect when you want something tasty without feeling too heavy. It is a smart choice for a balanced lifestyle. Pair it with <strong>MANAZO Drink</strong> for a refreshing and satisfying combination.</li><li><strong>Manna Chicken Supreme</strong><br>This meal gives you protein to help keep you fuller for longer, while the vegetables add freshness and balance. It is a great option when you want a meal that feels complete and nourishing. Pair it with <strong>MANAZO Drink</strong> for a wholesome finish.</li><li><strong>Sunrise Egg Delight</strong><br>Eggs are a satisfying source of protein and can help keep hunger under control. This is a simple, tasty, and filling option for anyone trying to eat more mindfully. Pair it with <strong>MANAZO Drink</strong> for added refreshment.</li></ol><strong>Helpful Advice:</strong><ul><li>Limit fries and oversized portions when possible.</li><li>Drink water regularly and stay active.</li><li>Choose balanced meals instead of skipping meals.</li><li>Enjoy food that supports your goals and still tastes great.</li></ul>`,
            'None': `If you do not have a specific health condition, you can still enjoy meals that are balanced, delicious, and energizing. Our menu is designed to give you options that fit everyday life, whether you are at work, school, home, or on the move.<br><br><strong>Recommended Meals</strong><ol><li><strong>Manna Chicken Supreme</strong><br>A satisfying and well-rounded meal that combines protein and vegetables in one delicious sandwich. Pair it with <strong>MANAZO Drink</strong> for a refreshing wellness combination that is perfect any day of the week.</li><li><strong>Champion’s Breakfast Pack</strong><br>A nourishing and energizing choice that helps you start your day feeling full and focused. Pair it with <strong>MANAZO Drink</strong> for a complete and refreshing breakfast experience.</li><li><strong>Sunrise Egg Delight</strong><br>A simple, tasty, and wholesome option that works well for breakfast or a light meal anytime. Pair it with <strong>MANAZO Drink</strong> for a satisfying and refreshing choice.</li></ol><strong>MANAZO Drink</strong> is a refreshing, naturally inspired wellness beverage made with ginger, turmeric, moringa, hibiscus, cinnamon, lemongrass, cloves, and jaggery. It is a lovely way to complete your meal and enjoy something both refreshing and nourishing.`
        };

        let selectedFoodType = null;

        // Helper to map typed input to a foodType (so typing behaves like clicking the food button)
        function matchFoodType(text){
            if(!text) return null;
            const t = String(text).toLowerCase().trim();
            for(const f of foodTypes){
                const fNorm = f.toLowerCase().trim();
                if(t === fNorm || t.includes(fNorm) || fNorm.includes(t)) return f;
            }
            return null;
        }

        function renderButtons(list, dataAttr) {
            return list.map(item => `<button data-${dataAttr}="${item}" style="margin:6px;padding:8px 12px;border-radius:6px;background:#eee;border:1px solid #ccc;cursor:pointer;">${item}</button>`).join('');
        }

        function renderWelcomePrompt() {
            if (window._welcomeRendered) return;
            window._welcomeRendered = true;
            const welcome = welcomeGreetings[Math.floor(Math.random() * welcomeGreetings.length)];
            // Try to speak welcome
            try{ speak(welcome); }catch(e){}
            // Append prompt with food type options
            const html = `<div style="margin-bottom:8px;">${welcome}<br><div style="margin-top:10px;">${renderButtons(foodTypes, 'food')}</div></div>`;
            appendMessage('ai', html);
        }

        // Delegated click handler inside chat for our generated buttons
        chat.addEventListener('click', function(e) {
            const btn = e.target.closest('button');
            if (!btn) return;
            // Food type buttons
            if (btn.dataset.food) {
                selectedFoodType = btn.dataset.food;
                appendMessage('user', selectedFoodType);
                const aiText = `Great choice! You selected <strong>${selectedFoodType}</strong>.<br>Before I recommend the best meals, do you have any health condition I should consider?`;
                appendMessage('ai', aiText + '<div style="margin-top:10px;">' + renderButtons(healthOptions, 'health') + '</div>');
                speak(`Great choice! ${selectedFoodType}. Before I recommend the best meals, do you have any health condition I should consider?`);
                return;
            }
            // Health option buttons
            if (btn.dataset.health) {
                const condition = btn.dataset.health;
                appendMessage('user', condition);
                const rec = recommendations[condition] || 'Thanks. Here are some options.';
                // Render recommendation and single Order Now CTA
                let recHtml = `<div>${rec}</div>`;
                recHtml += '<div style="margin-top:10px;"><button data-action="order-now" style="margin-right:8px;background:#28a745;color:#fff;padding:10px 14px;border:none;border-radius:8px;font-weight:600;">Order Now</button></div>';
                appendMessage('ai', recHtml);
                speak(rec.replace(/<[^>]+>/g, ''));
                return;
            }
            // CTA buttons (checkout/add-more/similar)
            if (btn.dataset.action) {
                const action = btn.dataset.action;
                if (action === 'order-now') {
                    appendMessage('user', 'Order Now');
                    // Open the ordering link for the user to place the order externally
                    window.open('https://www.restaurantlogin.com/api/fb/z5q_rm', '_blank');
                    // Log the intent and show payment instructions (user completes payment separately)
                    logOrderToBlockchain('Order placed via Order Now button');
                    showAccountDetails('Thanks! Your order link has been opened. ' + paymentReminderText());
                    speak('Thanks! I opened the order page. Please place the order there and remember to come back here to make payment.');
                }
            }
        });

        // Start the interactive prompt on load and attempt robust speech on load/refresh
        let _welcomeSpoken = false;
        function attemptSpeakWelcome(){
            if(_welcomeSpoken) return;
            _welcomeSpoken = true;
            try{ if(window.speechSynthesis && window.speechSynthesis.getVoices) window.speechSynthesis.getVoices(); }catch(e){}
            renderWelcomePrompt();
        }

        // Show audio enable banner on load
        function showAudioBanner() {
            const banner = document.getElementById('audioBanner');
            if (banner) banner.style.display = 'block';
        }

        // Hide audio banner and enable audio
        function enableAudio() {
            audioEnabled = true;
            const banner = document.getElementById('audioBanner');
            if (banner) banner.style.display = 'none';
            // If there's a pending utterance (browser blocked before user gesture), speak it now
            if (pendingUtteranceText) {
                try { speak(pendingUtteranceText, { cancel: false }); } catch (e) {}
                pendingUtteranceText = null;
            }
            attemptSpeakWelcome();
        }

        window.addEventListener('load', function() { showAudioBanner(); renderWelcomePrompt(); });
        window.addEventListener('pageshow', function(e){ if(e.persisted && !audioEnabled) showAudioBanner(); });
        document.addEventListener('visibilitychange', function(){ if(document.visibilityState === 'visible' && !audioEnabled) showAudioBanner(); });
        window.addEventListener('focus', function(){ if(!audioEnabled) showAudioBanner(); });

        document.getElementById('enableAudioBannerBtn').addEventListener('click', enableAudio);

        const foodColors = [
            '#FFEBEE', '#FFF8E1', '#E8F5E9', '#E3F2FD', '#F3E5F5', '#FFF3E0', '#FBE9E7', '#F9FBE7', '#F0F4C3', '#F1F8E9'
        ];
        function setRandomFoodColor() {
            document.body.style.background = foodColors[Math.floor(Math.random() * foodColors.length)];
        }
        setRandomFoodColor();
        setInterval(setRandomFoodColor, 4000); // Change color every 4 seconds

        // Add these buttons above the chat
        function renderActionBar() {
            let actionBar = document.getElementById('actionBar');
            if (!actionBar) {
                actionBar = document.createElement('div');
                actionBar.id = 'actionBar';
                actionBar.style.display = 'flex';
                actionBar.style.justifyContent = 'space-between';
                actionBar.style.marginBottom = '12px';
                document.querySelector('.container').insertBefore(actionBar, document.getElementById('chat'));
            }
            actionBar.innerHTML = `
                <button id="preOrderBtn" style="flex:1;margin-right:6px;">Pre Order</button>
                <button id="menuBtn" style="flex:1;margin-right:6px;">Menu</button>
                <button id="drinksBtn" style="flex:1;margin-right:6px;">MANAZO Drinks</button>
                <button id="makePaymentBtn" style="flex:1;">Make Payment</button>
            `;
        }
        renderActionBar();

        // Button event listeners
        function showManazoInfo(){
            const manazo = `<div style="max-width:420px;"><h3>MANAZO DRINK</h3><p>Refresh your body naturally with <strong>MANAZO</strong>, a delicious wellness drink infused with carefully selected fruits, herbs, and spices known for their nourishing properties.</p><p>Every bottle is crafted to help you stay refreshed, energized, and revitalized throughout your day.</p><ul><li>✔️ Refreshing Taste</li><li>✔️ Naturally Inspired Ingredients</li><li>✔️ Supports Hydration</li><li>✔️ Rich in Plant-Based Goodness</li><li>✔️ Perfect for Home, Work, School & Travel</li></ul><p><em>Refresh Naturally. Thrive Daily.</em></p><div style="margin-top:8px;"><button data-action="order-now" style="background:#2e7d32;color:#fff;padding:8px 12px;border:none;border-radius:6px;">Order MANAZO</button></div></div>`;
            appendMessage('ai', manazo);
        }

        function setActionBarListeners() {
            const pre = document.getElementById('preOrderBtn'); if(pre) pre.onclick = function() { window.open('https://www.restaurantlogin.com/api/fb/z5q_rm', '_blank'); };
            const menu = document.getElementById('menuBtn'); if(menu) menu.onclick = function() { window.open('https://www.restaurantlogin.com/api/fb/z5q_rm', '_blank'); };
            const drinks = document.getElementById('drinksBtn'); if(drinks) drinks.onclick = function() { showManazoInfo(); };
            const pay = document.getElementById('makePaymentBtn'); if(pay) pay.onclick = function() { showAccountDetails(paymentReminderText()); };
        }
        setActionBarListeners();
        // Always re-apply listeners after each AI response (in case action bar is re-rendered)
        const oldAppendMessage = appendMessage;
        appendMessage = function(sender, text) {
            oldAppendMessage(sender, text);
            setActionBarListeners();
        }

        // Add WhatsApp chat button (more visible + subtle animation)
        (function addWhatsAppButton(){
            const wa = document.createElement('button');
            wa.id = 'waBtn';
            wa.setAttribute('aria-label', 'Chat with us on WhatsApp');
            wa.title = 'Chat with us on WhatsApp';
            wa.innerHTML = '<span style="font-size:1.2em;line-height:1">💬</span><span style="font-weight:700;margin-left:8px;">WhatsApp</span>';
            Object.assign(wa.style, {
                position: 'fixed', right: '18px', bottom: '18px', zIndex: 100000,
                background: '#25D366', color: '#fff', border: '2px solid rgba(0,0,0,0.08)', padding: '14px 16px', borderRadius: '32px', boxShadow: '0 6px 18px rgba(0,0,0,0.22)', cursor: 'pointer', fontWeight: '700', fontSize: '1.05rem', display: 'flex', alignItems: 'center'
            });
            wa.onclick = function(){ window.open('https://api.whatsapp.com/send?phone=2348083505863&text=Hello%20Manna%20Grab%20%26%20Go', '_blank'); };
            // Subtle pulse animation using WAAPI for broad compatibility
            try{
                wa.animate([
                    { transform: 'scale(1)' },
                    { transform: 'scale(1.075)' },
                    { transform: 'scale(1)' }
                ], { duration: 1800, iterations: Infinity });
            }catch(e){}
            document.body.appendChild(wa);
        })();
    </script>
